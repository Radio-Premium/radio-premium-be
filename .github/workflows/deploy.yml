name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: mutefm-radio-premium-deploy
      APPLICATION_NAME: MuteFM-RadioPremium
      ENVIRONMENT_NAME: MuteFM-RadioPremium-env
      REGION: ap-northeast-2

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Zip application
        run: |
          mkdir -p build
          zip -r build/deploy.zip . -x '*.git*' '*.github*' '*.DS_Store'

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Upload zip to S3
        run: |
          aws s3 cp build/deploy.zip s3://${{ env.S3_BUCKET }}/deploy-${{ env.SHORT_SHA }}.zip

      - name: Create new EB app version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.APPLICATION_NAME }} \
            --version-label radio-premium-${{ env.SHORT_SHA }}-${{ github.run_number }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=deploy-${{ env.SHORT_SHA }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ env.ENVIRONMENT_NAME }} \
            --version-label radio-premium-${{ env.SHORT_SHA }}-${{ github.run_number }}
